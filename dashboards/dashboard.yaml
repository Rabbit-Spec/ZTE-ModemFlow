# ==========================================
# 卡片：中兴 ZX279133 光猫数据展示卡片
# 功能：自动化数据采集与监控
# 作者：https://github.com/Rabbit-Spec
# 版本：1.1.6
# 日期：2026.03.05
# ==========================================

type: vertical-stack
cards:
  - type: picture-elements
    image: /local/img/zte_modem.jpg?v=1
    aspect_ratio: "21:9"
    card_mod:
      style: |
        ha-card {
          border-radius: 16px !important;
          border: 1.5px solid var(--ha-card-border-color) !important;
          overflow: hidden;
          box-shadow: var(--ha-card-box-shadow) !important;
        }
    elements:
      - type: state-label
        entity: sensor.zte_modem_info
        style:
          left: 13px
          top: 63px
          transform: none
          pointer-events: none
        card_mod:
          style: |
            :host { font-size: 0px !important; }
            :host::before {
              content: "光猫仪表盘"; 
              font-size: 32px !important; 
              font-weight: 900 !important;
              /* 👇 核心修改：将字体颜色改为高级深灰色 */
              color: #2c2c2e !important; 
              letter-spacing: 6px !important;
              /* 👇 核心修改：将黑色阴影改为白色的高光背景圈，托起深色字体 */
              text-shadow: 0px 1px 8px rgba(255,255,255,0.9), 0px 0px 4px rgba(255,255,255,1);
              display: block;
            }
      - type: state-label
        entity: sensor.zte_modem_info
        style:
          left: 17px
          top: 120px
          transform: none
          pointer-events: none
        card_mod:
          style: |
            :host { font-size: 0px !important; }
            :host::before {
              content: "G100P-17N3" !important;
              font-size: 19px !important;
              font-weight: 600 !important;
              /* 👇 字体改为深灰色 */
              color: #3a3a3c !important; 
              letter-spacing: 2px !important;
              text-shadow: 0px 1px 5px rgba(255,255,255,0.9);
              display: block;
            }
  - type: custom:mini-graph-card
    height: 147
    hours_to_show: 0.5
    points_per_hour: 30
    upper_bound: 80
    lower_bound: 30
    lower_bound_secondary: 0
    entities:
      - entity: sensor.zte_modem_info
        name: CPU 温度
        color: "#ff3d00"
        show_state: true
      - entity: sensor.zte_modem_info
        attribute: cpu
        name: CPU 占用
        color: "#00e5ff"
        y_axis: secondary
        show_state: true
        unit: "%"
    show:
      labels: true
      labels_secondary: true
      fill: fade
      legend: true
    card_mod:
      style: |
        ha-card {
          color: var(--primary-text-color) !important;
        }
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.guang_mao_pon_wu_li_cuo_wu
        primary: "{{ states(entity) }} pkts"
        secondary: PON 物理错误 (FEC)
        icon: mdi:check-decagram
        tap_action:
          action: more-info
        color: green
        features_position: bottom
      - type: custom:mushroom-template-card
        entity: sensor.guang_mao_lian_lu_yan_chi
        primary: "{{ states(entity) }} ms"
        secondary: 内网延迟
        icon: mdi:access-point-network
        color: >-
          {% if states(entity) | float(0) < 5 %} green  {% elif states(entity) |
          float(0) < 20 %} yellow {% else %} red {% endif %}
        features_position: bottom
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.guang_mao_cpu_fu_zai
        name: CPU 负载
        icon: mdi:cpu-64-bit
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.zte_modem_info
        name: CPU 温度
        icon: mdi:thermometer
        icon_color: orange
      - type: custom:mushroom-entity-card
        entity: sensor.guang_mao_nei_cun_zhan_yong
        name: RAM 占用
        icon: mdi:memory
        icon_color: purple
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.zte_modem_info
        icon: mdi:timer-outline
        primary: >-
          {% set uptime = state_attr(entity, 'uptime') | int(0) %} {{ uptime //
          86400 }} 天 {{ (uptime % 86400) // 3600 }} 时 {{ (uptime % 3600) // 60
          }} 分
        secondary: 运行时间
        color: teal
        features_position: bottom
      - type: custom:mushroom-template-card
        primary: 重启光猫
        secondary: 约 3 分钟恢复
        icon: mdi:restart
        tap_action:
          action: call-service
          service: shell_command.reboot_modem_only
          confirmation:
            text: ⚠️ 确定要重启光猫吗？家里网络将会断开大约 3 分钟！
        color: red
        features_position: bottom
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.guang_mao_pon_jie_shou_bao
        icon: mdi:download-network-outline
        primary: "{{ states(entity) }}"
        secondary: PON 接收包
        features_position: bottom
        color: cyan
      - type: custom:mushroom-template-card
        entity: sensor.guang_mao_pon_fa_song_bao
        icon: mdi:upload-network-outline
        primary: "{{ states(entity) }}"
        secondary: PON 发送包
        icon_color: deep-orange
        features_position: bottom
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.guang_mao_lan_jie_shou_bao
        icon: mdi:import
        primary: "{{ states(entity) }}"
        secondary: LAN 接收包
        icon_color: blue
        features_position: bottom
      - type: custom:mushroom-template-card
        entity: sensor.guang_mao_lan_fa_song_bao
        icon: mdi:export
        primary: "{{ states(entity) }}"
        secondary: LAN 发送包
        icon_color: amber
        features_position: bottom
